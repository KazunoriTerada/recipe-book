<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うちのレシピ帳</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Shippori+Mincho:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf6f0;
  --card-bg: #ffffff;
  --text: #2c2416;
  --text-light: #7a6e5d;
  --accent: #c4522a;
  --accent-light: #e8734e;
  --accent-bg: #fdf0eb;
  --green: #5a7a4a;
  --green-bg: #eef4ea;
  --blue: #4a6a8a;
  --blue-bg: #eaf0f6;
  --gold: #b8952a;
  --gold-bg: #fdf8ea;
  --border: #e8dfd4;
  --shadow: 0 2px 12px rgba(44,36,22,0.06);
  --shadow-hover: 0 6px 24px rgba(44,36,22,0.12);
  --radius: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4a868' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: linear-gradient(135deg, #c4522a 0%, #a84020 100%);
  padding: 0;
  box-shadow: 0 4px 20px rgba(196,82,42,0.3);
}

.header-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.header h1 {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.6rem;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.08em;
  text-shadow: 0 2px 4px rgba(0,0,0,0.15);
}

.header-icon {
  font-size: 1.8rem;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
}

/* Breadcrumb */
.breadcrumb {
  max-width: 900px;
  margin: 0 auto;
  padding: 14px 24px 0;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  color: var(--text-light);
  position: relative;
  z-index: 1;
}

.breadcrumb span {
  cursor: pointer;
  transition: color 0.2s;
}
.breadcrumb span:hover { color: var(--accent); }
.breadcrumb .sep { color: var(--border); cursor: default; }
.breadcrumb .current { color: var(--text); font-weight: 700; cursor: default; }

/* Search */
.search-wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 16px 24px;
  position: relative;
  z-index: 1;
}

.search-box {
  width: 100%;
  padding: 14px 20px 14px 48px;
  border: 2px solid var(--border);
  border-radius: 50px;
  font-family: inherit;
  font-size: 1rem;
  background: var(--card-bg);
  color: var(--text);
  transition: border-color 0.25s, box-shadow 0.25s;
  outline: none;
}

.search-box:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(196,82,42,0.1);
}

.search-icon {
  position: absolute;
  left: 42px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.2rem;
  color: var(--text-light);
  pointer-events: none;
}

/* Content */
.content {
  max-width: 900px;
  margin: 0 auto;
  padding: 8px 24px 60px;
  position: relative;
  z-index: 1;
}

/* Category Grid */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
  animation: fadeUp 0.4s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.cat-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 22px 18px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.cat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.2s;
}

.cat-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.cat-card:hover::before { opacity: 1; }

.cat-card:active { transform: translateY(-1px); }

.cat-card .emoji {
  font-size: 2.2rem;
  margin-bottom: 8px;
  display: block;
}

.cat-card .label {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text);
}

.cat-card .count {
  font-size: 0.78rem;
  color: var(--text-light);
  margin-top: 4px;
}

/* Subcategory / Recipe list */
.sub-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  animation: fadeUp 0.35s ease;
}

.sub-item {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 16px 20px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.2s;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
}

.sub-item:hover {
  transform: translateX(4px);
  box-shadow: var(--shadow-hover);
  border-color: var(--accent-light);
}

.sub-item .emoji { font-size: 1.5rem; flex-shrink: 0; }

.sub-item .info { flex: 1; min-width: 0; }
.sub-item .name { font-weight: 700; font-size: 1rem; }
.sub-item .count { font-size: 0.8rem; color: var(--text-light); margin-top: 2px; }

.sub-item .arrow {
  color: var(--text-light);
  font-size: 1.1rem;
  transition: transform 0.2s, color 0.2s;
}

.sub-item:hover .arrow {
  transform: translateX(4px);
  color: var(--accent);
}

/* Recipe Detail */
.recipe-detail {
  animation: fadeUp 0.35s ease;
}

.recipe-header {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 28px 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 16px;
}

.recipe-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.4;
}

.recipe-star {
  display: inline-block;
  color: var(--gold);
  font-size: 0.85rem;
  margin-bottom: 8px;
}

.recipe-section {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 22px 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 12px;
}

.recipe-section h3 {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.ingredients-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.ing-tag {
  background: var(--accent-bg);
  color: var(--accent);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.88rem;
  font-weight: 500;
  border: 1px solid rgba(196,82,42,0.15);
}

.recipe-memo {
  font-size: 0.92rem;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
}

.recipe-memo a {
  color: var(--blue);
  text-decoration: underline;
}

.badge-x {
  display: inline-block;
  background: #fee;
  color: #c44;
  font-size: 0.75rem;
  padding: 2px 8px;
  border-radius: 8px;
  margin-left: 6px;
  font-weight: 700;
}

.badge-star {
  display: inline-block;
  color: var(--gold);
  margin-right: 2px;
}

.badge-triangle {
  display: inline-block;
  color: var(--blue);
  margin-right: 2px;
}

/* Back button */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--accent);
  font-family: inherit;
  font-size: 0.92rem;
  font-weight: 700;
  cursor: pointer;
  padding: 8px 0;
  margin-bottom: 12px;
  transition: color 0.2s;
}
.back-btn:hover { color: var(--accent-light); }

/* No results */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}
.no-results .emoji { font-size: 3rem; margin-bottom: 12px; display: block; }

/* Mobile */
@media (max-width: 600px) {
  .cat-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .header h1 { font-size: 1.25rem; }
  .content { padding: 8px 16px 60px; }
  .search-wrap { padding: 12px 16px; }
  .search-icon { left: 34px; }
  .recipe-header { padding: 20px 18px; }
  .recipe-section { padding: 18px; }
  .recipe-title { font-size: 1.25rem; }
}
</style>
</head>

// ===== APP STATE =====
let state = { level: 'top', path: [], searchQuery: '' };

// ===== HELPERS =====
function getAllRecipes() {
  const results = [];
  for (const [topKey, topVal] of Object.entries(DATA)) {
    for (const [subKey, subVal] of Object.entries(topVal.children)) {
      for (const r of subVal.recipes) {
        results.push({ ...r, topKey, subKey, topEmoji: topVal.emoji, subEmoji: subVal.emoji });
      }
    }
  }
  return results;
}

function starStr(n) {
  if (!n) return '';
  return '<span class="badge-star">' + '★'.repeat(n) + '</span>';
}

function renderBadge(r) {
  let s = '';
  if (r.star) s += starStr(r.star);
  if (r.triangle) s += '<span class="badge-triangle">▲</span>';
  if (r.bad) s += '<span class="badge-x">✕</span>';
  return s;
}

// ===== RENDER =====
function render() {
  const app = document.getElementById('app');
  const bc = document.getElementById('breadcrumb');
  const q = state.searchQuery.trim().toLowerCase();

  // Search mode
  if (q.length > 0) {
    bc.innerHTML = '';
    const all = getAllRecipes();
    const filtered = all.filter(r =>
      r.name.toLowerCase().includes(q) ||
      (r.ingredients && r.ingredients.toLowerCase().includes(q)) ||
      r.topKey.toLowerCase().includes(q) ||
      r.subKey.toLowerCase().includes(q)
    );
    if (filtered.length === 0) {
      app.innerHTML = '<div class="no-results"><span class="emoji">🔍</span><p>「' + escHtml(state.searchQuery) + '」に一致するレシピが見つかりません</p></div>';
      return;
    }
    app.innerHTML = '<div class="sub-list">' + filtered.map((r, i) =>
      `<div class="sub-item" onclick="openSearchResult(${i})" data-search-idx="${i}">
        <span class="emoji">${r.subEmoji}</span>
        <div class="info">
          <div class="name">${renderBadge(r)}${escHtml(r.name)}</div>
          <div class="count">${escHtml(r.topKey)} › ${escHtml(r.subKey)}</div>
        </div>
        <span class="arrow">›</span>
      </div>`
    ).join('') + '</div>';
    window._searchResults = filtered;
    return;
  }

  if (state.level === 'top') {
    bc.innerHTML = '<span class="current">🏠 トップ</span>';
    const entries = Object.entries(DATA);
    app.innerHTML = '<div class="cat-grid">' + entries.map(([key, val]) => {
      const count = Object.values(val.children).reduce((s, c) => s + c.recipes.length, 0);
      return `<div class="cat-card" onclick="goTo('${key}')">
        <span class="emoji">${val.emoji}</span>
        <div class="label">${escHtml(key)}</div>
        <div class="count">${count}品</div>
      </div>`;
    }).join('') + '</div>';
  }
  else if (state.level === 'sub') {
    const topKey = state.path[0];
    const topVal = DATA[topKey];
    bc.innerHTML = `<span onclick="goHome()">🏠 トップ</span><span class="sep">›</span><span class="current">${topVal.emoji} ${escHtml(topKey)}</span>`;
    const entries = Object.entries(topVal.children);
    app.innerHTML = '<button class="back-btn" onclick="goHome()">← 戻る</button>'
      + '<div class="cat-grid">' + entries.map(([key, val]) =>
      `<div class="cat-card" onclick="goToSub('${escAttr(key)}')">
        <span class="emoji">${val.emoji}</span>
        <div class="label">${escHtml(key)}</div>
        <div class="count">${val.recipes.length}品</div>
      </div>`
    ).join('') + '</div>';
  }
  else if (state.level === 'list') {
    const topKey = state.path[0];
    const subKey = state.path[1];
    const topVal = DATA[topKey];
    const subVal = topVal.children[subKey];
    bc.innerHTML = `<span onclick="goHome()">🏠 トップ</span><span class="sep">›</span><span onclick="goTo('${topKey}')">${topVal.emoji} ${escHtml(topKey)}</span><span class="sep">›</span><span class="current">${subVal.emoji} ${escHtml(subKey)}</span>`;
    app.innerHTML = `<button class="back-btn" onclick="goTo('${escAttr(topKey)}')">← 戻る</button>`
      + '<div class="sub-list">' + subVal.recipes.map((r, i) =>
      `<div class="sub-item" onclick="openRecipe(${i})">
        <span class="emoji">${subVal.emoji}</span>
        <div class="info">
          <div class="name">${renderBadge(r)}${escHtml(r.name)}</div>
          ${r.ingredients ? '<div class="count">' + escHtml(r.ingredients.split('，').slice(0,3).join('，')) + '…</div>' : ''}
        </div>
        <span class="arrow">›</span>
      </div>`
    ).join('') + '</div>';
  }
  else if (state.level === 'detail') {
    const topKey = state.path[0];
    const subKey = state.path[1];
    const idx = state.path[2];
    const topVal = DATA[topKey];
    const subVal = topVal.children[subKey];
    const r = subVal.recipes[idx];
    bc.innerHTML = `<span onclick="goHome()">🏠 トップ</span><span class="sep">›</span><span onclick="goTo('${topKey}')">${topVal.emoji} ${escHtml(topKey)}</span><span class="sep">›</span><span onclick="goToSub('${escAttr(subKey)}')">${subVal.emoji} ${escHtml(subKey)}</span><span class="sep">›</span><span class="current">${escHtml(r.name)}</span>`;
    renderDetail(r, `goToSub('${escAttr(subKey)}')`);
  }
}

function renderDetail(r, backAction) {
  const app = document.getElementById('app');
  let html = `<button class="back-btn" onclick="${backAction}">← 戻る</button>`;
  html += '<div class="recipe-detail">';
  html += `<div class="recipe-header">
    ${r.star ? '<div class="recipe-star">' + '★'.repeat(r.star) + ' おすすめ</div>' : ''}
    ${r.bad ? '<div class="recipe-star" style="color:#c44">✕ 不評</div>' : ''}
    ${r.triangle ? '<div class="recipe-star" style="color:var(--blue)">▲ まあまあ</div>' : ''}
    <div class="recipe-title">${escHtml(r.name)}</div>
  </div>`;

  if (r.ingredients) {
    const ings = r.ingredients.split(/[，,]/).map(s => s.trim()).filter(Boolean);
    html += `<div class="recipe-section">
      <h3>🧂 材料</h3>
      <div class="ingredients-list">${ings.map(i => `<span class="ing-tag">${escHtml(i)}</span>`).join('')}</div>
    </div>`;
  }

  if (r.memo) {
    let memoHtml = escHtml(r.memo);
    // Make URLs clickable
    memoHtml = memoHtml.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    html += `<div class="recipe-section">
      <h3>📝 メモ・作り方</h3>
      <div class="recipe-memo">${memoHtml}</div>
    </div>`;
  }

  if (!r.ingredients && !r.memo) {
    html += `<div class="recipe-section">
      <h3>📝 メモ</h3>
      <div class="recipe-memo" style="color:var(--text-light)">詳細はまだ登録されていません</div>
    </div>`;
  }

  html += '</div>';
  app.innerHTML = html;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '\\"');
}

// ===== NAVIGATION =====
function goHome() {
  state = { level: 'top', path: [], searchQuery: '' };
  document.getElementById('searchBox').value = '';
  render();
  window.scrollTo(0, 0);
}

function goTo(topKey) {
  state = { level: 'sub', path: [topKey], searchQuery: '' };
  document.getElementById('searchBox').value = '';
  render();
  window.scrollTo(0, 0);
}

function goToSub(subKey) {
  const topKey = state.path[0];
  state = { level: 'list', path: [topKey, subKey], searchQuery: '' };
  document.getElementById('searchBox').value = '';
  render();
  window.scrollTo(0, 0);
}

function openRecipe(idx) {
  state.level = 'detail';
  state.path[2] = idx;
  render();
  window.scrollTo(0, 0);
}

function openSearchResult(idx) {
  const r = window._searchResults[idx];
  state = { level: 'detail', path: [r.topKey, r.subKey, null], searchQuery: '' };
  // find real index
  const recipes = DATA[r.topKey].children[r.subKey].recipes;
  const realIdx = recipes.findIndex(x => x.name === r.name);
  state.path[2] = realIdx >= 0 ? realIdx : 0;
  document.getElementById('searchBox').value = '';
  render();
  window.scrollTo(0, 0);
}

// Search
document.getElementById('searchBox').addEventListener('input', function(e) {
  state.searchQuery = e.target.value;
  if (state.searchQuery.trim()) {
    state.level = 'search';
  } else {
    state.level = 'top';
    state.path = [];
  }
  render();
});

// Initial render
render();
</script>
